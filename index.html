<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ULTIMATE FRUIT SMASHER v2.0</title>
<style>
    /* --- CORE SYSTEM VARIABLES --- */
    :root {
        --bg-color: #0f0f13;
        --grid-color: rgba(255, 255, 255, 0.03);
        --text-color: #ffffff;
        --menu-bg: rgba(20, 20, 25, 0.9);
        --menu-border: rgba(255, 255, 255, 0.1);
        --accent: #ff2a5f;
        --accent-glow: rgba(255, 42, 95, 0.4);
        
        /* Watermelon */
        --wm-light: #5dbb63;
        --wm-dark: #2d6a32;
        --wm-stripe: #1a4720;
        --wm-inner: #ff3355;
        --wm-juice: rgba(255, 51, 85, 0.8);
        
        /* Apple */
        --ap-red: #ff3b30;
        --ap-dark: #8b0000;
        --ap-highlight: #ff6b6b;
        --ap-inner: #f8f4e6;
        --ap-juice: rgba(248, 244, 230, 0.8);
        
        /* Orange */
        --or-main: #ff9500;
        --or-dark: #cc5500;
        --or-highlight: #ffcc00;
        --or-inner: #ffa500;
        --or-juice: rgba(255, 165, 0, 0.8);
        
        /* Coconut */
        --co-shell: #4a2e1b;
        --co-dark: #2a1608;
        --co-hair: #3d2314;
        --co-inner: #ffffff;
        --co-juice: rgba(255, 255, 255, 0.8);
        
        /* Pumpkin */
        --pu-main: #ff6b00;
        --pu-shadow: #cc4400;
        --pu-crease: #993300;
        --pu-inner: #ffa64d;
        --pu-juice: rgba(255, 166, 77, 0.8);
        
        /* Pineapple */
        --pi-main: #ffd900;
        --pi-shadow: #b38600;
        --pi-spike: #664d00;
        --pi-inner: #ffe680;
        --pi-juice: rgba(255, 230, 128, 0.8);
    }

    /* --- RESET & LAYOUT --- */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body, html {
        width: 100%; height: 100%;
        background-color: var(--bg-color);
        background-image: 
            linear-gradient(var(--grid-color) 1px, transparent 1px),
            linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
        background-size: 30px 30px;
        color: var(--text-color);
        font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        overflow: hidden;
        user-select: none;
        perspective: 1000px;
    }

    #game-container {
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        height: 100vh; position: relative;
    }

    /* --- UI ELEMENTS --- */
    #header-hud {
        position: absolute; top: 20px;
        display: flex; flex-direction: column; align-items: center;
        z-index: 100; width: 100%; pointer-events: none;
    }

    #menu {
        display: flex; gap: 10px; padding: 12px 24px;
        background: var(--menu-bg); border: 1px solid var(--menu-border);
        border-radius: 50px; backdrop-filter: blur(10px);
        box-shadow: 0 10px 30px rgba(0,0,0,0.5); pointer-events: auto;
    }

    .menu-btn {
        background: transparent; color: #888;
        border: none; padding: 8px 16px;
        cursor: pointer; font-weight: 800;
        font-size: 0.9rem; text-transform: uppercase;
        letter-spacing: 1px; border-radius: 20px;
        transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        position: relative; overflow: hidden;
    }

    .menu-btn::before {
        content: ''; position: absolute;
        top: 0; left: -100%; width: 100%; height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
        transition: left 0.5s;
    }

    .menu-btn:hover { color: #fff; transform: translateY(-2px); }
    .menu-btn:hover::before { left: 100%; }
    
    .menu-btn.active {
        color: #fff; background: var(--accent);
        box-shadow: 0 0 15px var(--accent-glow);
    }

    #stats-board {
        margin-top: 30px; display: flex;
        flex-direction: column; align-items: center;
        background: rgba(0,0,0,0.4); padding: 15px 40px;
        border-radius: 20px; border: 1px solid rgba(255,255,255,0.05);
    }

    #stage-label {
        font-size: 0.8rem; color: var(--accent);
        letter-spacing: 4px; font-weight: bold; margin-bottom: 5px;
    }

    #click-count {
        font-size: 5rem; font-weight: 900; line-height: 1;
        background: linear-gradient(180deg, #fff, #aaa);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));
    }

    #progress-bar-container {
        width: 300px; height: 8px; background: rgba(255,255,255,0.1);
        border-radius: 4px; margin-top: 15px; overflow: hidden;
    }

    #progress-bar {
        height: 100%; width: 0%; background: var(--accent);
        transition: width 0.1s linear, background-color 0.3s;
        box-shadow: 0 0 10px var(--accent);
    }

    /* --- STAGE & ENTITY --- */
    #world {
        position: relative; width: 500px; height: 500px;
        display: flex; justify-content: center; align-items: center;
        transform-style: preserve-3d;
    }

    #fruit-wrapper {
        position: absolute; width: 350px; height: 350px;
        cursor: crosshair; transform-origin: center center;
        transition: transform 0.05s ease;
    }

    /* Procedural Cracking Canvas */
    #crack-canvas {
        position: absolute; top: 0; left: 0;
        width: 100%; height: 100%; pointer-events: none; z-index: 10;
        border-radius: inherit; clip-path: inherit;
    }

    #fx-canvas {
        position: absolute; top: 0; left: 0;
        width: 100%; height: 100%; pointer-events: none; z-index: 20;
    }

    /* --- HIGH-FIDELITY CSS FRUIT BASE --- */
    .fruit-body {
        position: absolute; width: 100%; height: 100%;
        border-radius: 50%; z-index: 1;
        box-shadow: 
            inset -30px -30px 60px rgba(0,0,0,0.6), 
            inset 20px 20px 40px rgba(255,255,255,0.3),
            20px 30px 40px rgba(0,0,0,0.5);
        transition: all 0.3s;
    }

    /* Specific Fruit Architectures */
    /* 1. Watermelon */
    .fruit-watermelon {
        background: repeating-linear-gradient( 45deg,
            var(--wm-light), var(--wm-light) 15px,
            var(--wm-stripe) 15px, var(--wm-stripe) 25px,
            var(--wm-dark) 25px, var(--wm-dark) 40px
        );
        border-radius: 45% 55% 45% 55% / 55% 45% 55% 45%;
    }

    /* 2. Apple */
    .fruit-apple {
        background: radial-gradient(circle at 35% 35%, var(--ap-highlight) 0%, var(--ap-red) 40%, var(--ap-dark) 100%);
        border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
    }
    .fruit-apple::before {
        content: ''; position: absolute; top: -15px; left: 50%;
        transform: translateX(-50%); width: 12px; height: 35px;
        background: linear-gradient(to right, #4a2e1b, #2a1608);
        border-radius: 6px; z-index: -1; box-shadow: 2px 2px 5px rgba(0,0,0,0.5);
    }

    /* 3. Orange */
    .fruit-orange {
        background: radial-gradient(circle at 30% 30%, var(--or-highlight), var(--or-main), var(--or-dark));
        background-image: 
            radial-gradient(rgba(0,0,0,0.1) 15%, transparent 16%),
            radial-gradient(rgba(255,255,255,0.1) 15%, transparent 16%);
        background-size: 8px 8px; background-position: 0 0, 4px 4px;
        border-radius: 50%;
    }

    /* 4. Coconut */
    .fruit-coconut {
        background: radial-gradient(circle at 40% 40%, var(--co-shell), var(--co-dark));
        background-image: repeating-linear-gradient(
            -45deg, transparent, transparent 3px, rgba(0,0,0,0.15) 3px, rgba(0,0,0,0.15) 6px
        );
        border-radius: 48% 52% 49% 51% / 51% 49% 52% 48%;
    }
    .fruit-coconut::after {
        content: ''; position: absolute; top: 25%; left: 35%;
        width: 25px; height: 25px; border-radius: 50%; background: #111;
        box-shadow: 35px 15px 0 #111, 15px 35px 0 #111, inset 2px 2px 5px rgba(0,0,0,1);
    }

    /* 5. Pumpkin */
    .fruit-pumpkin {
        background: var(--pu-main);
        border-radius: 45% 45% 40% 40% / 55% 55% 45% 45%;
        background-image: repeating-linear-gradient(
            90deg, 
            transparent 0%, transparent 12%, 
            rgba(0,0,0,0.15) 13%, rgba(0,0,0,0.25) 15%, 
            transparent 16%
        );
        box-shadow: inset -40px -40px 60px var(--pu-shadow), inset 20px 20px 40px rgba(255,255,255,0.3);
    }

    /* 6. Pineapple */
    .fruit-pineapple {
        background: var(--pi-main);
        border-radius: 40% 40% 45% 45% / 50% 50% 45% 45%;
        background-image: 
            linear-gradient(135deg, var(--pi-spike) 25%, transparent 25%),
            linear-gradient(225deg, var(--pi-spike) 25%, transparent 25%),
            linear-gradient(45deg, var(--pi-spike) 25%, transparent 25%),
            linear-gradient(315deg, var(--pi-spike) 25%, transparent 25%);
        background-position: 15px 0, 15px 0, 0 0, 0 0;
        background-size: 30px 30px;
    }
    .fruit-pineapple::before {
        content: ''; position: absolute; top: -100px; left: 10%; width: 80%; height: 120px;
        background: linear-gradient(to top, #1e5620, #4caf50);
        clip-path: polygon(50% 0%, 20% 100%, 80% 100%, 0% 20%, 100% 20%); z-index: -1;
    }

    /* --- ANIMATIONS --- */
    @keyframes hit-jolt {
        0% { transform: scale(1) translate(0, 0); }
        20% { transform: scale(0.92) translate(var(--jx), var(--jy)); }
        40% { transform: scale(1.05) translate(calc(var(--jx) * -0.5), calc(var(--jy) * -0.5)); }
        60% { transform: scale(0.98) translate(calc(var(--jx) * 0.25), calc(var(--jy) * 0.25)); }
        100% { transform: scale(1) translate(0, 0); }
    }

    @keyframes pulse-critical {
        0% { filter: drop-shadow(0 0 10px var(--accent-glow)) brightness(1); }
        50% { filter: drop-shadow(0 0 40px var(--accent)) brightness(1.3) hue-rotate(-10deg); transform: scale(1.02); }
        100% { filter: drop-shadow(0 0 10px var(--accent-glow)) brightness(1); }
    }

    @keyframes shake-extreme {
        0% { transform: translate(0,0) rotate(0deg); }
        25% { transform: translate(5px, -5px) rotate(2deg); }
        50% { transform: translate(-5px, 5px) rotate(-2deg); }
        75% { transform: translate(-5px, -5px) rotate(1deg); }
        100% { transform: translate(5px, 5px) rotate(-1deg); }
    }

    .anim-hit { animation: hit-jolt 0.15s ease-out forwards; }
    .anim-critical { animation: pulse-critical 0.5s infinite, shake-extreme 0.1s infinite; }

    /* Damage Filters based on stage */
    .damage-low { filter: saturate(0.9) brightness(0.95); }
    .damage-med { filter: saturate(0.8) brightness(0.85) contrast(1.1); }
    .damage-high { filter: saturate(0.6) brightness(0.7) contrast(1.3); }
    .damage-crit { filter: saturate(1.5) brightness(1.2) contrast(1.5); }

</style>
</head>
<body>

<div id="game-container">
    <div id="header-hud">
        <div id="menu">
            <button class="menu-btn active" data-fruit="watermelon">Watermelon</button>
            <button class="menu-btn" data-fruit="apple">Apple</button>
            <button class="menu-btn" data-fruit="orange">Orange</button>
            <button class="menu-btn" data-fruit="coconut">Coconut</button>
            <button class="menu-btn" data-fruit="pumpkin">Pumpkin</button>
            <button class="menu-btn" data-fruit="pineapple">Pineapple</button>
        </div>

        <div id="stats-board">
            <div id="stage-label">INTEGRITY</div>
            <div id="click-count">0<span style="font-size: 2rem; color: #666;">/50</span></div>
            <div id="progress-bar-container">
                <div id="progress-bar"></div>
            </div>
        </div>
    </div>

    <div id="world">
        <div id="fruit-wrapper">
            <div id="active-fruit" class="fruit-body fruit-watermelon"></div>
            <canvas id="crack-canvas" width="350" height="350"></canvas>
        </div>
    </div>
    
    <canvas id="fx-canvas"></canvas>
</div>

<script>
    /**
     * ULTIMATE FRUIT SMASHER ENGINE
     * Implements 50 distinct stages of structural degradation via canvas fractal pathing.
     */

    const CONFIG = {
        MAX_STAGE: 50,
        FRUITS: {
            watermelon: { inner: '#ff3355', dark: '#800000', juice: 'rgba(255, 51, 85, 0.9)', radius: 175 },
            apple:      { inner: '#f8f4e6', dark: '#500000', juice: 'rgba(248, 244, 230, 0.9)', radius: 175 },
            orange:     { inner: '#ffa500', dark: '#804000', juice: 'rgba(255, 165, 0, 0.9)', radius: 175 },
            coconut:    { inner: '#ffffff', dark: '#000000', juice: 'rgba(255, 255, 255, 0.9)', radius: 175 },
            pumpkin:    { inner: '#ffa64d', dark: '#662200', juice: 'rgba(255, 166, 77, 0.9)', radius: 175 },
            pineapple:  { inner: '#ffe680', dark: '#806000', juice: 'rgba(255, 230, 128, 0.9)', radius: 175 }
        }
    };

    // DOM Elements
    const elFruitWrapper = document.getElementById('fruit-wrapper');
    const elActiveFruit = document.getElementById('active-fruit');
    const elClickCount = document.getElementById('click-count');
    const elProgressBar = document.getElementById('progress-bar');
    const elMenuBtns = document.querySelectorAll('.menu-btn');
    
    // Canvas Setup
    const crackCanvas = document.getElementById('crack-canvas');
    const ctxCrack = crackCanvas.getContext('2d', { willReadFrequently: true });
    const fxCanvas = document.getElementById('fx-canvas');
    const ctxFx = fxCanvas.getContext('2d');

    // State
    let currentState = 0;
    let currentType = 'watermelon';
    let crackNodes = [];
    let particles = [];
    let isExploded = false;
    let animationFrameId;

    // Audio Engine (Synthesized)
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    function playSfx(type, intensity) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        const now = audioCtx.currentTime;
        
        if (type === 'hit') {
            osc.type = intensity > 40 ? 'sawtooth' : 'triangle';
            osc.frequency.setValueAtTime(150 - (intensity * 2), now);
            osc.frequency.exponentialRampToValueAtTime(10, now + 0.1);
            gain.gain.setValueAtTime(0.3 + (intensity * 0.01), now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
            osc.start(now); osc.stop(now + 0.1);
            
            // Crunch layer
            if (intensity > 20) {
                const noise = audioCtx.createBufferSource();
                const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.1, audioCtx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < buffer.length; i++) data[i] = Math.random() * 2 - 1;
                noise.buffer = buffer;
                
                const noiseFilter = audioCtx.createBiquadFilter();
                noiseFilter.type = 'lowpass';
                noiseFilter.frequency.value = 1000 + (intensity * 50);
                
                const noiseGain = audioCtx.createGain();
                noiseGain.gain.setValueAtTime(0.1 + (intensity * 0.005), now);
                noiseGain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                
                noise.connect(noiseFilter);
                noiseFilter.connect(noiseGain);
                noiseGain.connect(audioCtx.destination);
                noise.start(now);
            }
        } else if (type === 'explode') {
            osc.type = 'square';
            osc.frequency.setValueAtTime(50, now);
            osc.frequency.exponentialRampToValueAtTime(0.01, now + 1.0);
            gain.gain.setValueAtTime(1.0, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 1.0);
            osc.start(now); osc.stop(now + 1.0);
        }
    }

    // --- PROCEDURAL CRACK ENGINE ---
    function initCracks() {
        ctxCrack.clearRect(0, 0, crackCanvas.width, crackCanvas.height);
        crackNodes = [];
        // Seed initial impact points
        for(let i=0; i<3; i++) {
            crackNodes.push({
                x: 175 + (Math.random() * 100 - 50),
                y: 175 + (Math.random() * 100 - 50),
                angle: Math.random() * Math.PI * 2,
                depth: 0,
                active: true,
                branches: [],
                width: 1
            });
        }
    }

    function advanceCracks(stage) {
        const config = CONFIG.FRUITS[currentType];
        
        // Define crack styling based on stage (1-50)
        let crackColor = 'rgba(0,0,0,0.8)';
        let innerGlow = false;
        
        if (stage > 15) crackColor = config.dark;
        if (stage > 30) {
            crackColor = config.inner;
            innerGlow = true;
        }

        ctxCrack.lineCap = 'round';
        ctxCrack.lineJoin = 'round';

        // Fractal Growth Algorithm
        let newNodes = [];
        
        crackNodes.forEach(node => {
            if (!node.active) return;
            
            // Draw current segment
            const length = 5 + Math.random() * (stage * 0.2);
            const nextX = node.x + Math.cos(node.angle) * length;
            const nextY = node.y + Math.sin(node.angle) * length;
            
            // Keep within bounds
            const distFromCenter = Math.hypot(nextX - 175, nextY - 175);
            if (distFromCenter > config.radius - 10) {
                node.active = false;
                return;
            }

            // Render Path
            ctxCrack.beginPath();
            ctxCrack.moveTo(node.x, node.y);
            ctxCrack.lineTo(nextX, nextY);
            
            // Thicken lines as stage progresses
            ctxCrack.lineWidth = node.width + (stage * 0.05);
            
            // Style
            ctxCrack.strokeStyle = crackColor;
            if (innerGlow) {
                ctxCrack.shadowBlur = stage * 0.5;
                ctxCrack.shadowColor = crackColor;
            } else {
                ctxCrack.shadowBlur = 0;
            }
            
            ctxCrack.stroke();
            
            // Update node
            node.x = nextX;
            node.y = nextY;
            node.depth++;

            // Branching logic (higher stage = more branches)
            if (Math.random() < 0.1 + (stage * 0.005) && node.depth < 20) {
                const splitAngle = (Math.random() * 1.5) - 0.75; // -45 to +45 deg
                newNodes.push({
                    x: node.x, y: node.y,
                    angle: node.angle + splitAngle,
                    depth: node.depth,
                    active: true,
                    branches: [],
                    width: node.width * 0.8
                });
                node.angle -= splitAngle; // Diverge main branch
            }
            
            // Chance to die
            if (Math.random() < 0.05) node.active = false;
        });
        
        crackNodes = crackNodes.concat(newNodes);

        // Stage-based body CSS filters
        elActiveFruit.className = `fruit-body fruit-${currentType}`; // reset
        if (stage > 10 && stage <= 20) elActiveFruit.classList.add('damage-low');
        if (stage > 20 && stage <= 35) elActiveFruit.classList.add('damage-med');
        if (stage > 35 && stage < 50) elActiveFruit.classList.add('damage-high');
        if (stage >= 40) elFruitWrapper.classList.add('anim-critical');
    }

    // --- PARTICLE SYSTEM ---
    function resizeFx() {
        fxCanvas.width = window.innerWidth;
        fxCanvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeFx);
    resizeFx();

    class Particle {
        constructor(x, y, type, fruitConf, isEpic = false) {
            this.x = x; this.y = y;
            const angle = Math.random() * Math.PI * 2;
            const speed = (Math.random() * 15 + 5) * (isEpic ? 3 : 1);
            this.vx = Math.cos(angle) * speed;
            this.vy = Math.sin(angle) * speed - (isEpic ? 10 : 5);
            this.size = Math.random() * (isEpic ? 15 : 6) + 2;
            this.life = 1.0;
            this.decay = Math.random() * 0.02 + (isEpic ? 0.005 : 0.02);
            this.gravity = 0.5;
            this.type = type; // 'chunk' or 'juice'
            this.color = type === 'chunk' ? (Math.random()>0.5 ? fruitConf.inner : fruitConf.dark) : fruitConf.juice;
            this.rotation = Math.random() * 360;
            this.rotSpeed = (Math.random() - 0.5) * 20;
        }

        update() {
            this.vy += this.gravity;
            this.x += this.vx;
            this.y += this.vy;
            this.rotation += this.rotSpeed;
            this.life -= this.decay;
        }

        draw(ctx) {
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.rotate(this.rotation * Math.PI / 180);
            ctx.globalAlpha = Math.max(0, this.life);
            
            if (this.type === 'juice') {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(0, 0, this.size, 0, Math.PI * 2);
                ctx.fill();
            } else {
                ctx.fillStyle = this.color;
                ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size);
            }
            ctx.restore();
        }
    }

    function spawnHitParticles(x, y, amount) {
        const rect = elFruitWrapper.getBoundingClientRect();
        const spawnX = x || (rect.left + rect.width/2);
        const spawnY = y || (rect.top + rect.height/2);
        const conf = CONFIG.FRUITS[currentType];
        
        for(let i=0; i<amount; i++) {
            particles.push(new Particle(spawnX, spawnY, Math.random()>0.3?'juice':'chunk', conf, false));
        }
    }

    function triggerExplosion() {
        isExploded = true;
        playSfx('explode');
        elFruitWrapper.style.display = 'none';
        
        const rect = elFruitWrapper.getBoundingClientRect();
        const cx = rect.left + rect.width/2;
        const cy = rect.top + rect.height/2;
        const conf = CONFIG.FRUITS[currentType];
        
        // Massive particle burst
        for(let i=0; i<300; i++) {
            particles.push(new Particle(cx, cy, Math.random()>0.5?'juice':'chunk', conf, true));
        }

        // Screen Flash
        document.body.style.backgroundColor = conf.inner;
        setTimeout(() => { document.body.style.backgroundColor = 'var(--bg-color)'; }, 100);

        // Auto Reset
        setTimeout(() => { resetGame(); }, 2000);
    }

    function renderLoop() {
        ctxFx.clearRect(0, 0, fxCanvas.width, fxCanvas.height);
        
        for(let i = particles.length - 1; i >= 0; i--) {
            let p = particles[i];
            p.update();
            p.draw(ctxFx);
            if (p.life <= 0 || p.y > fxCanvas.height + 100) {
                particles.splice(i, 1);
            }
        }
        
        animationFrameId = requestAnimationFrame(renderLoop);
    }

    // --- GAME LOGIC ---
    function updateHUD() {
        elClickCount.innerHTML = `${currentState}<span style="font-size: 2rem; color: #666;">/50</span>`;
        const pct = (currentState / CONFIG.MAX_STAGE) * 100;
        elProgressBar.style.width = `${pct}%`;
        
        if (pct < 33) elProgressBar.style.backgroundColor = '#5dbb63';
        else if (pct < 66) elProgressBar.style.backgroundColor = '#ffcc00';
        else if (pct < 90) elProgressBar.style.backgroundColor = '#ff3b30';
        else {
            elProgressBar.style.backgroundColor = '#ffffff';
            elProgressBar.style.boxShadow = '0 0 20px #fff';
        }
    }

    function handleHit(e) {
        if (isExploded || currentState >= CONFIG.MAX_STAGE) return;
        
        currentState++;
        updateHUD();
        playSfx('hit', currentState);
        
        // Visual Impact
        elFruitWrapper.classList.remove('anim-hit');
        void elFruitWrapper.offsetWidth; // Trigger reflow
        
        // Determine hit vector
        const rect = elFruitWrapper.getBoundingClientRect();
        const cx = rect.left + rect.width/2;
        const cy = rect.top + rect.height/2;
        
        let clientX = cx, clientY = cy;
        if (e && e.type.includes('mouse')) { clientX = e.clientX; clientY = e.clientY; }
        else if (e && e.type.includes('touch')) { clientX = e.touches[0].clientX; clientY = e.touches[0].clientY; }

        const dirX = (cx - clientX) * 0.2;
        const dirY = (cy - clientY) * 0.2;
        
        elFruitWrapper.style.setProperty('--jx', `${dirX}px`);
        elFruitWrapper.style.setProperty('--jy', `${dirY}px`);
        elFruitWrapper.classList.add('anim-hit');

        // Execute stage degradation
        advanceCracks(currentState);
        
        // Spawn minor particles based on stage
        if (currentState > 10) {
            const amount = Math.floor(currentState / 5);
            spawnHitParticles(clientX, clientY, amount);
        }

        if (currentState >= CONFIG.MAX_STAGE) {
            triggerExplosion();
        }
    }

    function resetGame() {
        currentState = 0;
        isExploded = false;
        elFruitWrapper.style.display = 'block';
        elFruitWrapper.classList.remove('anim-critical');
        elFruitWrapper.className = '';
        elActiveFruit.className = `fruit-body fruit-${currentType}`;
        elProgressBar.style.boxShadow = '0 0 10px var(--accent)';
        initCracks();
        updateHUD();
    }

    function switchFruit(type) {
        if (currentState > 0 && currentState < CONFIG.MAX_STAGE && !isExploded) {
            // Visual feedback instead of blocking alert to keep game flow fast
            particles = []; // clear particles to signify reset
        }
        currentType = type;
        
        elMenuBtns.forEach(btn => btn.classList.remove('active'));
        document.querySelector(`[data-fruit="${type}"]`).classList.add('active');
        
        resetGame();
    }

    // --- EVENT BINDING ---
    // Fast click/touch handling without delay
    const eventOptions = { passive: false };
    
    elFruitWrapper.addEventListener('mousedown', (e) => { e.preventDefault(); handleHit(e); }, eventOptions);
    elFruitWrapper.addEventListener('touchstart', (e) => { e.preventDefault(); handleHit(e); }, eventOptions);

    elMenuBtns.forEach(btn => {
        btn.addEventListener('click', () => switchFruit(btn.getAttribute('data-fruit')));
    });

    // Boot
    initCracks();
    renderLoop();

</script>
</body>
</html>
